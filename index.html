<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Snake game | bootleg</title>
</head>
<body>

    <div class="title">
        YANYAN'S SNAKE GAME!
    </div>

    <div class="subtitle">
        copied and inspired from @AsmrProg on youtube
    </div>

    <div class="wrapper">
        <div class="game-details">
            <span class="score">Score: 0</span>
            <span class="high-score">High score: 0</span>
        </div>

        <div class="play-board"></div>
        <div class="controls">
                <i data-key="ArrowLeft" class="fa-solid fa-arrow-left"></i>
                <i data-key="ArrowUp" class="fa-solid fa-arrow-up"></i>
                <i data-key="ArrowRight" class="fa-solid fa-arrow-right"></i>
                <i data-key="ArrowDown" class="fa-solid fa-arrow-down"></i>
        </div>
    </div>


    

    <script src="index.js"></script>
</body>
</html>
